<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лобби</title>
    <!-- Подключаем внешний CSS -->
    <link rel="stylesheet" href="/static/style.css">
    <!-- Карта импортов для Three.js -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
        }
      }
    </script>
    <!-- Socket.IO должен быть загружен ДО lobby.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
</head>
<body>
    <!-- Контейнер для 3D-сцены -->
    <div id="canvas-container" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;"></div>

    <!-- Интерфейс поверх 3D -->
    <div class="ui-overlay">
         <!-- Левая верхняя панель: список участников (сворачиваемый) -->
        <div class="participants-panel" id="participants-panel">
            <div class="panel-header">
                <span>Участники</span>
                <span class="toggle-icon">▼</span>
            </div>
            <div class="participants-content">
                <div class="online-section">
                    <h4>В сети</h4>
                    <ul id="online-participants"></ul>
                </div>
                <div class="offline-section">
                    <h4>Не в сети</h4>
                    <ul id="offline-participants"></ul>
                </div>
            </div>
        </div>

        <!-- Правая верхняя панель: меню лобби -->
        <div class="lobby-menu">
            <div class="menu-item lobby-name">Лобби: <span id="lobby-name">Загрузка...</span></div>
            <div class="menu-item invite-code" id="gm-invite-code" style="display:none;">Код: <span id="invite-code-value"></span></div>
                <button class="menu-item edit-toggle" id="edit-toggle" style="display:none;" onclick="toggleEditMode()" title="Режим редактирования карты">✏️</button>
            <button class="menu-item settings-btn" id="settings-btn" style="display:none;" onclick="toggleSettings()" title="Настройки лобби">⚙️</button>
            <button class="menu-item exit-btn" onclick="leaveLobby()" title="Покинуть лобби">✕</button>
        </div>
        <div id="settings-panel" class="settings-panel" style="display:none;">
            <div class="settings-header">
                <span>Настройки лобби</span>
                <button onclick="closeSettings()" style="background:none; border:none; color:white; font-size:1.2rem; cursor:pointer;">✕</button>
            </div>
            <div class="settings-tabs">
                <button class="tab-btn active" onclick="showSettingsTab('banned')">Забаненные</button>
                <!-- Здесь позже можно добавить другие вкладки -->
            </div>
            <div id="settings-content">
                <!-- Контент будет подгружаться динамически -->
            </div>
        </div>

        <!-- Левая панель: чат -->
        <div class="chat-panel">
            <div class="panel-header">Чат</div>
            <div id="chat" class="chat-messages"></div>
            <div class="chat-input-area">
                <input type="text" id="message-input" placeholder="Введите сообщение...">
                <button class="btn btn-primary" onclick="sendMessage()">→</button>
            </div>
        </div>

        <!-- Правая панель (для будущих фич, пока пустая) -->
        <div class="right-panel">
            <div class="panel-header">Персонажи</div>
            <button class="btn btn-primary btn-sm" onclick="showCreateCharacterForm()" style="margin-bottom: 10px;">+ Создать персонажа</button>
            <div id="lobby-characters-list" class="characters-list"></div>
        </div>

        <!-- Нижняя панель управления картой -->
        <div class="map-tools">
            <div class="marker-types">
                <button class="marker-btn red" onclick="setMarkerType('default')">🔴</button>
                <button class="marker-btn blue" onclick="setMarkerType('blue')">🔵</button>
                <button class="marker-btn green" onclick="setMarkerType('green')">🟢</button>
                <span>Тип: <span id="current-marker-type">default</span></span>
            </div>
            <button class="btn btn-primary" onclick="addMarkerAtCenter()">➕ Добавить метку</button>
                 <div class="tile-palette" style="display: inline-block; margin-left: 15px; border-left: 1px solid #444; padding-left: 15px;">
                    <span>Тип тайла:</span>
                    <select id="tile-type-select" class="character-select" style="width: auto;">
                        <option value="grass">🌿 Трава</option>
                        <option value="forest">🌲 Лес</option>
                        <option value="house">🏠 Дом</option>
                        <option value="water">💧 Вода</option>
                        <option value="rock">🪨 Скала</option>
                        <option value="sand">🏜️ Песок</option>
                        <option value="swamp">🟤 Болото</option>
                    </select>
                </div>

                <div style="display: inline-block; margin-left: 15px;">
                    <span>Радиус кисти:</span>
                    <input type="range" id="brush-radius" min="0" max="5" value="0" style="width: 80px; vertical-align: middle;">
                    <span id="brush-radius-value">0</span>
                </div>

                <div style="display: inline-block; margin-left: 15px;">
                    <span>Высота:</span>
                    <input type="range" id="tile-height" min="0.5" max="3.0" step="0.1" value="1.0" style="width: 100px;">
                    <span id="tile-height-value">1.0</span>
                </div>
        </div>

        <div id="visibility-modal" class="modal" style="display:none;">
            <div class="modal-content">
                <span class="close" onclick="closeVisibilityModal()">&times;</span>
                <h3>Настройка видимости персонажа</h3>
                <p id="visibility-character-name"></p>
                <div id="visibility-participants-list"></div>
                <button onclick="saveVisibility()">Сохранить</button>
            </div>
        </div>

        <!-- Информация о тайле -->
        <div id="tile-info" style="position: absolute; bottom: 100px; right: 20px; background: rgba(0,0,0,0.7); color: white; padding: 10px; border-radius: 8px; display: none; pointer-events: none; z-index: 5;">
            <div id="tile-info-content"></div>
        </div>

    </div>

    <!-- Основной скрипт лобби (модуль) -->
    <script type="module" src="/static/lobby.js"></script>
</body>
</html>
